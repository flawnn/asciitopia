# GitHub Pages deploy for the showcase site (site/).
#
# INERT until the Pages launch is approved: workflow_dispatch-only, so nothing
# deploys on push. To go live:
#   1. Settings → Pages → Source: GitHub Actions
#   2. add `push: { branches: [main] }` under `on:`
#
# The site serves from https://flawnn.github.io/asciitopia/ (a project-page
# subpath), so the build passes --base=/asciitopia/.
#
# TODO before launch: generate a social preview image (a good frame of the
# fire pattern) into site/public/og.png — index.html already points og:image
# at <pages-url>/og.png.
name: Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm via Corepack
        run: corepack prepare pnpm@11.12.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter=./packages/* run build

      - name: Build site
        run: pnpm --filter @asciitopia/site exec vite build --base=/asciitopia/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
